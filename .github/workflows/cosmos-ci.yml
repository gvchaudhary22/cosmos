# Cosmos CI — Sentinel
# Gates: lint → test → type-check → security → quality
name: Cosmos CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'cosmos/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'cosmos/**'

defaults:
  run:
    working-directory: cosmos

jobs:
  # ---------------------------------------------------------------------------
  # Gate 1: Lint (ruff — fast, blocks on errors)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check app/ --select=E,W,F --ignore=E501,E402

      - name: Ruff format check
        run: ruff format app/ --check

  # ---------------------------------------------------------------------------
  # Gate 2: Type Check (mypy — advisory but reported)
  # ---------------------------------------------------------------------------
  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps + mypy
        run: |
          pip install -r requirements.txt
          pip install mypy

      - name: mypy
        run: mypy app/ --ignore-missing-imports --no-error-summary
        continue-on-error: true   # Advisory — does not block merge yet

  # ---------------------------------------------------------------------------
  # Gate 3: Unit Tests (pytest — BLOCKING, required for merge)
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: [lint]
    env:
      COSMOS_ENV: test
      DATABASE_URL: sqlite+aiosqlite:///./test_cosmos.db
      ANTHROPIC_API_KEY: test-key-not-real

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -x -q --tb=short \
            --ignore=tests/eval \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            2>&1 || python -m pytest tests/ -x -q --tb=short --ignore=tests/eval

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cosmos-coverage
          path: cosmos/coverage.xml

  # ---------------------------------------------------------------------------
  # Gate 4: Security Scan (secret scan + dependency audit)
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret scan
        run: |
          echo "=== Scanning Cosmos for Secrets ==="
          FOUND=0
          for pattern in \
            'AKIA[0-9A-Z]{16}' \
            'sk-[a-zA-Z0-9]{48}' \
            'ghp_[a-zA-Z0-9]{36}' \
            'xoxb-[0-9]+-[a-zA-Z0-9]+' \
            '-----BEGIN RSA PRIVATE KEY-----'; do
            if grep -rnE "$pattern" cosmos/app/ --include='*.py' 2>/dev/null; then
              echo "ERROR: Potential secret matching: $pattern"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then exit 1; fi
          echo "No secrets found"

      - name: Set up Python for dependency audit
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r cosmos/requirements.txt --ignore-vuln PYSEC-2024-48 2>/dev/null || \
          pip-audit -r cosmos/requirements.txt 2>/dev/null || true
        continue-on-error: true  # Advisory — does not block yet

  # ---------------------------------------------------------------------------
  # Gate 5: Config & Doc Consistency (self-audit)
  # ---------------------------------------------------------------------------
  self-audit:
    name: Self-Audit
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Verify CLAUDE.md exists
        run: test -f cosmos/CLAUDE.md && echo "CLAUDE.md present" || (echo "MISSING: cosmos/CLAUDE.md" && exit 1)

      - name: Verify metadata.yml is valid YAML
        run: |
          pip install pyyaml
          python3 -c "import yaml; yaml.safe_load(open('cosmos/metadata.yml'))" && echo "metadata.yml valid YAML"

      - name: Verify error-codes.md exists
        run: test -f cosmos/docs/error-codes.md && echo "error-codes.md present" || echo "ADVISORY: cosmos/docs/error-codes.md missing"

      - name: Check for debug artifacts
        run: |
          if grep -rn "pdb.set_trace\|breakpoint()\|import ipdb" cosmos/app/ --include='*.py' 2>/dev/null; then
            echo "ERROR: Debug breakpoints found in app/ — remove before merge"
            exit 1
          fi
          echo "No debug artifacts found"

      - name: Verify hooks are executable
        run: |
          for hook in cosmos/.claude/hooks/*.sh; do
            if [ -f "$hook" ] && [ ! -x "$hook" ]; then
              echo "WARNING: $hook is not executable (chmod +x $hook)"
            fi
          done
          echo "Hook executable check done"
