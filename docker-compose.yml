version: '3.8'

services:
  cosmos:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://cosmos:cosmos@postgres:5432/cosmos
      - REDIS_URL=redis://redis:6379/0
      - MCAPI_BASE_URL=http://host.docker.internal:8080
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app  # Hot reload in dev

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cosmos
      POSTGRES_USER: cosmos
      POSTGRES_PASSWORD: cosmos
    ports:
      - "5433:5432"
    volumes:
      - cosmos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cosmos"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - cosmos_redisdata:/data

volumes:
  cosmos_pgdata:
  cosmos_redisdata:
